# ── 공통 logging 정책 ──────────────────────────────────────
# Docker 기본 json-file 드라이버는 컨테이너 재생성 시 로그가 유실된다.
# max-size + max-file 으로 디스크 사용량을 제한하면서 로그를 보존한다.
# e2-standard-2 (50 GB boot disk) 기준: 전체 서비스 합계 약 2 GB 상한.
# x-logging 은 YAML anchor 로, 각 서비스에서 *default-logging 으로 참조.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ══════════════════════════════════════
  # PostgreSQL + TimescaleDB
  # ══════════════════════════════════════
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: aqts-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${DB_NAME:-aqts}
      POSTGRES_USER: ${DB_USER:-aqts_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - postgres_wal_archive:/var/lib/postgresql/wal_archive
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f"
      - "-c"
      - "archive_timeout=300"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aqts_user} -d ${DB_NAME:-aqts}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # MongoDB
  # ══════════════════════════════════════
  mongodb:
    image: mongo:7.0.9
    container_name: aqts-mongodb
    restart: unless-stopped
    logging: *default-logging
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-aqts_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-aqts}
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Redis
  # ══════════════════════════════════════
  redis:
    image: redis:7.2.5-alpine
    container_name: aqts-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Backend (FastAPI)
  # ══════════════════════════════════════
  backend:
    # 운영: GHCR 에서 서명된 이미지 pull (cosign verify 후 사용)
    # 개발: docker-compose.override.yml 이 build 블록을 추가
    image: ghcr.io/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/aqts-backend:${IMAGE_TAG:-latest}
    container_name: aqts-backend
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      SCHEDULER_ENABLED: "false"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aqts-network
    stop_grace_period: 60s
    # 프로덕션 시 read_only: true 추가, volumes 제거
    # 개발 시 아래 docker-compose.override.yml 사용

  # ══════════════════════════════════════
  # Scheduler (트레이딩 스케줄러 — 별도 프로세스)
  # ══════════════════════════════════════
  scheduler:
    # backend 와 동일한 이미지 사용 (multi-process 분리만 다름)
    image: ghcr.io/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/aqts-backend:${IMAGE_TAG:-latest}
    container_name: aqts-scheduler
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    env_file:
      - .env
    environment:
      SCHEDULER_ENABLED: "true"
    command: ["python", "scheduler_main.py"]
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    # scheduler 는 FastAPI HTTP 프로세스가 아니므로 backend 의 Dockerfile
    # HEALTHCHECK (curl localhost:8000/...) 를 상속하면 구조적으로 실패한다.
    # core/scheduler_heartbeat.py 가 _scheduler_loop 매 iteration 마다 파일
    # mtime 을 갱신하므로, 해당 mtime 이 SCHEDULER_HEARTBEAT_STALE_SECONDS
    # (기본 180s) 이내인지를 healthcheck 로 본다. 외부 의존성이 전혀 없어
    # healthcheck 자체가 장애원이 되지 않는다.
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import os,time,sys;
          p=os.environ.get('SCHEDULER_HEARTBEAT_PATH','/tmp/scheduler.heartbeat');
          max_age=int(os.environ.get('SCHEDULER_HEARTBEAT_STALE_SECONDS','180'));
          sys.exit(0 if os.path.exists(p) and (time.time()-os.path.getmtime(p))<max_age else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - aqts-network
    stop_grace_period: 30s

  # ══════════════════════════════════════
  # Prometheus (메트릭 수집)
  # ══════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aqts-prometheus
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    # ── Healthcheck: /-/ready 는 prometheus 가 config 로드 + storage
    # 준비 완료 후 200 을 반환한다. busybox wget 은 prom/prometheus
    # 베이스 이미지에 포함되어 있으므로 별도 패키지 불필요.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      backend:
        condition: service_started
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Alertmanager (알림 라우팅)
  # ══════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aqts-alertmanager
    restart: unless-stopped
    logging: *default-logging
    # ── 환경변수 → 템플릿 렌더링 ─────────────────────────────────
    # alertmanager 바이너리는 환경변수를 네이티브로 치환하지 않으므로
    # entrypoint 에서 sed 로 ${TELEGRAM_*} 플레이스홀더를 치환한 뒤
    # /tmp/alertmanager.yml 로 렌더링하고 그것을 --config.file 로 읽는다.
    # 자세한 배경/회고: docs/operations/alerting.md
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        : "$${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN required for alertmanager}"
        : "$${TELEGRAM_CHAT_ID:?TELEGRAM_CHAT_ID required for alertmanager}"
        sed -e 's|$${TELEGRAM_BOT_TOKEN}|'"$$TELEGRAM_BOT_TOKEN"'|g' \
            -e 's|$${TELEGRAM_CHAT_ID}|'"$$TELEGRAM_CHAT_ID"'|g' \
            /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager
    # ── Healthcheck: /-/ready 는 alertmanager 가 config 로드 + cluster
    # 합류 완료 후 200 을 반환한다. 본 회귀(2026-04)의 교훈 — config
    # 로드 실패로 인한 재시작 루프를 분 단위로 감지하기 위한 관측 layer.
    # busybox wget 은 prom/alertmanager 베이스 이미지에 포함되어 있다.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # DB 백업 (pg_dump + mongodump cron)
  # ══════════════════════════════════════
  db-backup:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: aqts-db-backup
    restart: unless-stopped
    logging: *default-logging
    entrypoint: ["/bin/bash", "/scripts/backup_cron.sh"]
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      MONGO_HOST: mongodb
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      GCS_BACKUP_BUCKET: ${GCS_BACKUP_BUCKET:-}
    volumes:
      - ./scripts/backup_db.sh:/scripts/backup_db.sh:ro
      - ./scripts/backup_cron.sh:/scripts/backup_cron.sh:ro
      - backup_data:/backups
      - postgres_wal_archive:/wal_archive:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Grafana (메트릭 시각화)
  # ══════════════════════════════════════
  grafana:
    image: grafana/grafana:11.1.0
    container_name: aqts-grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # OpenTelemetry Collector (분산 추적 수집)
  # ══════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: aqts-otel-collector
    restart: unless-stopped
    logging: *default-logging
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./monitoring/otel-collector/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:13133:13133" # Health check
    depends_on:
      - jaeger
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Jaeger (분산 추적 UI)
  # ══════════════════════════════════════
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aqts-jaeger
    restart: unless-stopped
    logging: *default-logging
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:${JAEGER_UI_PORT:-16686}:16686"  # Jaeger UI
      - "127.0.0.1:14250:14250"                      # gRPC (Collector)
    networks:
      - aqts-network

volumes:
  postgres_data:
  postgres_wal_archive:
  mongodb_data:
  redis_data:
  backup_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  aqts-network:
    driver: bridge
