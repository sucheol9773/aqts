services:
  # ══════════════════════════════════════
  # PostgreSQL + TimescaleDB
  # ══════════════════════════════════════
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: aqts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aqts}
      POSTGRES_USER: ${DB_USER:-aqts_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - postgres_wal_archive:/var/lib/postgresql/wal_archive
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f"
      - "-c"
      - "archive_timeout=300"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aqts_user} -d ${DB_NAME:-aqts}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # MongoDB
  # ══════════════════════════════════════
  mongodb:
    image: mongo:7.0.9
    container_name: aqts-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-aqts_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-aqts}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Redis
  # ══════════════════════════════════════
  redis:
    image: redis:7.2.5-alpine
    container_name: aqts-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Backend (FastAPI)
  # ══════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqts-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SCHEDULER_ENABLED: "false"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aqts-network
    stop_grace_period: 60s
    # 프로덕션 시 read_only: true 추가, volumes 제거
    # 개발 시 아래 docker-compose.override.yml 사용

  # ══════════════════════════════════════
  # Scheduler (트레이딩 스케줄러 — 별도 프로세스)
  # ══════════════════════════════════════
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqts-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SCHEDULER_ENABLED: "true"
    command: ["python", "scheduler_main.py"]
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aqts-network
    stop_grace_period: 30s

  # ══════════════════════════════════════
  # Prometheus (메트릭 수집)
  # ══════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aqts-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      backend:
        condition: service_started
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Alertmanager (알림 라우팅)
  # ══════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aqts-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      - prometheus
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # DB 백업 (pg_dump + mongodump cron)
  # ══════════════════════════════════════
  db-backup:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: aqts-db-backup
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/scripts/backup_cron.sh"]
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      MONGO_HOST: mongodb
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      GCS_BACKUP_BUCKET: ${GCS_BACKUP_BUCKET:-}
    volumes:
      - ./scripts/backup_db.sh:/scripts/backup_db.sh:ro
      - ./scripts/backup_cron.sh:/scripts/backup_cron.sh:ro
      - backup_data:/backups
      - postgres_wal_archive:/wal_archive:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Grafana (메트릭 시각화)
  # ══════════════════════════════════════
  grafana:
    image: grafana/grafana:11.1.0
    container_name: aqts-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-aqts2026}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # OpenTelemetry Collector (분산 추적 수집)
  # ══════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: aqts-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./monitoring/otel-collector/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # Health check
    depends_on:
      - jaeger
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Jaeger (분산 추적 UI)
  # ══════════════════════════════════════
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aqts-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"  # Jaeger UI
      - "14250:14250"                      # gRPC (Collector)
    networks:
      - aqts-network

volumes:
  postgres_data:
  postgres_wal_archive:
  mongodb_data:
  redis_data:
  backup_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  aqts-network:
    driver: bridge
