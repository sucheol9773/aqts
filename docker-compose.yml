services:
  # ══════════════════════════════════════
  # PostgreSQL + TimescaleDB
  # ══════════════════════════════════════
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: aqts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aqts}
      POSTGRES_USER: ${DB_USER:-aqts_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aqts_user} -d ${DB_NAME:-aqts}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # MongoDB
  # ══════════════════════════════════════
  mongodb:
    image: mongo:7.0.9
    container_name: aqts-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-aqts_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-aqts}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Redis
  # ══════════════════════════════════════
  redis:
    image: redis:7.2.5-alpine
    container_name: aqts-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Backend (FastAPI)
  # ══════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqts-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aqts-network
    stop_grace_period: 60s
    # 프로덕션 시 read_only: true 추가, volumes 제거
    # 개발 시 아래 docker-compose.override.yml 사용

  # ══════════════════════════════════════
  # Prometheus (메트릭 수집)
  # ══════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aqts-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      backend:
        condition: service_started
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Alertmanager (알림 라우팅)
  # ══════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aqts-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      - prometheus
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Grafana (메트릭 시각화)
  # ══════════════════════════════════════
  grafana:
    image: grafana/grafana:11.1.0
    container_name: aqts-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-aqts2026}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - aqts-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  aqts-network:
    driver: bridge
