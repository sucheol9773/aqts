services:
  # ══════════════════════════════════════
  # PostgreSQL + TimescaleDB
  # ══════════════════════════════════════
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: aqts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aqts}
      POSTGRES_USER: ${DB_USER:-aqts_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aqts_user} -d ${DB_NAME:-aqts}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # MongoDB
  # ══════════════════════════════════════
  mongodb:
    image: mongo:7.0.9
    container_name: aqts-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-aqts_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-aqts}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Redis
  # ══════════════════════════════════════
  redis:
    image: redis:7.2.5-alpine
    container_name: aqts-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqts-network

  # ══════════════════════════════════════
  # Backend (FastAPI)
  # ══════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqts-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aqts-network
    stop_grace_period: 60s

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  aqts-network:
    driver: bridge
