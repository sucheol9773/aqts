[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
pythonpath = ["."]
addopts = "-v --tb=short --cov=core --cov=config --cov=db --cov-report=term-missing --cov-report=html:htmlcov"
filterwarnings = [
    "ignore::DeprecationWarning",
]
