# ══════════════════════════════════════
# Ruff Linter 설정
# ══════════════════════════════════════
[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line-too-long (black이 처리)
    "E402",   # module-import-not-at-top (동적 설정 로딩 패턴)
    "E741",   # ambiguous-variable-name (수학 변수 l, O 등)
]
fixable = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["F841"]  # 테스트에서 side-effect 확인용 변수 할당 허용

[tool.ruff.lint.isort]
known-first-party = ["core", "api", "config", "db", "contracts"]

# ══════════════════════════════════════
# Black 포맷터 설정
# ══════════════════════════════════════
[tool.black]
target-version = ["py311"]
line-length = 120

# ══════════════════════════════════════
# Pytest 설정
# ══════════════════════════════════════
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
pythonpath = ["."]
addopts = "-v --tb=short --cov=core --cov=config --cov=db --cov=api --cov=contracts --cov-report=term-missing --cov-report=html:htmlcov"
filterwarnings = [
    "ignore::DeprecationWarning",
    # optuna 4.x TPESampler(multivariate=True) 는 실험 기능 경고를 남긴다.
    # backend/core/hyperopt/optimizer.py 에서 의도적으로 사용 중이므로
    # ExperimentalWarning 을 silence 한다. (업스트림 stable 승격 시 재검토)
    "ignore::optuna.exceptions.ExperimentalWarning",
]
markers = [
    "smoke: 핵심 기능 빠른 검증 (CI 필수, < 60초)",
    "regression: 버그 재발 방지 테스트",
    "integration: 외부 서비스 연동 테스트 (DB, API 등)",
    "slow: 장시간 소요 테스트 (> 10초)",
]
