# ══════════════════════════════════════════════════════════════
# Document-Code Sync Check — 문서↔코드↔테스트 정합성 검증
# ══════════════════════════════════════════════════════════════
name: Doc Sync

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  doc-sync:
    name: Document Sync Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run document sync check
        run: python scripts/check_doc_sync.py --verbose

      - name: Run bool literal check
        run: python scripts/check_bool_literals.py

      - name: Run status SSOT check
        run: python scripts/gen_status.py

      - name: Run RBAC coverage check
        run: python scripts/check_rbac_coverage.py

      - name: Run CD stdin guard check
        # SSH heredoc 컨텍스트에서 자식 프로세스가 부모 bash 의 fd 0 을 소진해
        # 이후 라인이 조용히 스킵되는 회귀를 막는다. 2026-04-09 daily report
        # regression §4.7 (docker exec -i) 와 §4.8 (-T 없는 docker compose run)
        # 두 건의 CD 회귀에 대한 정적 방어선이다.
        run: python scripts/check_cd_stdin_guard.py

      - name: Run loguru style check
        # loguru 는 stdlib logging 의 '%' posarg 포맷을 해석하지 않는다.
        # ``logger.error("failure: %s", exc)`` 같은 호출은 실제로는 "failure: %s"
        # literal 만 기록되고 exception 전문이 사라지는 silent 관측 결손이 된다.
        # 회고: docs/operations/phase1-demo-verification-2026-04-11.md §10.15.
        run: python scripts/check_loguru_style.py

      - name: Run vuln-ignore parity check
        # .grype.yaml 과 backend/.pip-audit-ignore 는 ignore 목록을 공유하지
        # 않는다. 2026-04-22 lxml GHSA-vfmq-68hx-4jfw silent miss (PR #25 머지
        # 후 main CI grype 스텝이 high 로 재차단) 방어선. 신규 CVE/GHSA 억제
        # 시 두 파일을 동시에 업데이트하거나 `grype-only`/`pip-audit-only`
        # 단방향 마커로 예외 표시해야 한다. 상세: CLAUDE.md §9.
        run: python scripts/check_vuln_ignore_parity.py
