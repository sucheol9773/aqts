# ══════════════════════════════════════════════════════════════
# Document-Code Sync Check — 문서↔코드↔테스트 정합성 검증
# ══════════════════════════════════════════════════════════════
name: Doc Sync

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'README.md'
      - 'scripts/check_doc_sync.py'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'README.md'
      - 'scripts/check_doc_sync.py'

jobs:
  doc-sync:
    name: Document Sync Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run document sync check
        run: python scripts/check_doc_sync.py --verbose

      - name: Run bool literal check
        run: python scripts/check_bool_literals.py
