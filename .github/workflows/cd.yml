# ══════════════════════════════════════════════════════════════
# AQTS CD Pipeline — GCP 자동 배포
# ══════════════════════════════════════════════════════════════
# 트리거: main 브랜치 push + CI 통과 후 수동 승인
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  # ──────────────────────────────────
  # Stage 1: 배포 승인 게이트
  # ──────────────────────────────────
  deploy-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Deployment approved
        run: echo "✅ Deployment to production approved"

  # ──────────────────────────────────
  # Stage 2: GCP 서버 배포
  # ──────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: deploy-gate

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/gcp_key
          chmod 600 ~/.ssh/gcp_key
          # Host key verification skip for CI
          echo "StrictHostKeyChecking no" > ~/.ssh/config

      - name: Deploy to server
        env:
          SERVER_IP: ${{ secrets.GCP_SERVER_IP }}
          SERVER_USER: ${{ secrets.GCP_SERVER_USER }}
        run: |
          ssh -i ~/.ssh/gcp_key ${SERVER_USER}@${SERVER_IP} << 'DEPLOY_SCRIPT'
            set -e
            cd ~/aqts

            echo "═══ Step 1: Pull latest code ═══"
            git pull origin main

            echo "═══ Step 2: Build & restart services ═══"
            docker compose -f docker-compose.yml build --no-cache backend
            docker compose -f docker-compose.yml up -d

            echo "═══ Step 3: Wait for health check ═══"
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/api/system/health > /dev/null 2>&1; then
                echo "✅ Backend healthy after ${i}s"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ Health check failed after 30s"
                docker compose logs backend --tail=50
                exit 1
              fi
              sleep 2
            done

            echo "═══ Step 4: Verify all services ═══"
            docker compose ps
            echo "═══ Deployment complete ═══"
          DEPLOY_SCRIPT

      - name: Post-deploy verification
        env:
          SERVER_IP: ${{ secrets.GCP_SERVER_IP }}
          SERVER_USER: ${{ secrets.GCP_SERVER_USER }}
        run: |
          ssh -i ~/.ssh/gcp_key ${SERVER_USER}@${SERVER_IP} << 'VERIFY_SCRIPT'
            set -e
            cd ~/aqts

            # API 헬스체크
            HEALTH=$(curl -sf http://localhost:8000/api/system/health)
            echo "Health: $HEALTH"

            # 컨테이너 상태
            RUNNING=$(docker compose ps --format '{{.Name}} {{.Status}}' | grep -c "Up" || true)
            echo "Running containers: $RUNNING/4"

            if [ "$RUNNING" -lt 4 ]; then
              echo "❌ Not all containers running"
              docker compose ps
              exit 1
            fi

            echo "✅ All verification checks passed"
          VERIFY_SCRIPT

      - name: Notify deployment (Telegram)
        if: always()
        env:
          SERVER_IP: ${{ secrets.GCP_SERVER_IP }}
          SERVER_USER: ${{ secrets.GCP_SERVER_USER }}
          DEPLOY_STATUS: ${{ job.status }}
        run: |
          ssh -i ~/.ssh/gcp_key ${SERVER_USER}@${SERVER_IP} << NOTIFY_SCRIPT
            cd ~/aqts
            source .env
            STATUS="${DEPLOY_STATUS}"
            EMOJI=\$([ "\$STATUS" = "success" ] && echo "✅" || echo "❌")
            MSG="\${EMOJI} AQTS Deploy \${STATUS}
          Commit: ${GITHUB_SHA:0:7}
          Branch: main
          Time: \$(date '+%Y-%m-%d %H:%M:%S KST')"
            curl -sf "https://api.telegram.org/bot\${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="\${TELEGRAM_CHAT_ID}" \
              -d text="\${MSG}" > /dev/null 2>&1 || true
          NOTIFY_SCRIPT

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/gcp_key
