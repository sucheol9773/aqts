# ══════════════════════════════════════════════════════════════
# AQTS CD Pipeline — GCP 자동 배포 (롤백 지원)
# ══════════════════════════════════════════════════════════════
# 트리거: main 브랜치 push + CI 통과 후 자동 배포
# 안전장치:
#   1. 수동 승인 게이트 (environment: production)
#   2. 배포 전 스냅샷 (이전 이미지 태그 + DB 상태)
#   3. 헬스체크 실패 시 자동 롤백
#   4. Telegram 배포 결과 알림
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  DEPLOY_TIMEOUT: 120
  HEALTH_ENDPOINT: "http://localhost:8000/api/system/health"
  # 10위 supply-chain: GHCR 에서 서명된 이미지 pull (CI 가 push 한 것)
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_NAME: aqts-backend
  COSIGN_VERSION: v2.4.0

jobs:
  # ──────────────────────────────────
  # Stage 1: 배포 승인 게이트
  # ──────────────────────────────────
  deploy-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # environment: production  # 테스트 기간 비활성화 — 프로덕션 전환 시 주석 해제
    steps:
      - name: Deployment approved
        run: |
          echo "✅ Deployment approved by reviewer"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"

  # ──────────────────────────────────
  # Stage 2: 배포 전 스냅샷 + 배포 + 검증 + 롤백
  # ──────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: deploy-gate

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          GCP_HOST_KEY: ${{ secrets.GCP_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/gcp_key
          chmod 600 ~/.ssh/gcp_key
          # 호스트 키 검증 활성화 — MITM 방지
          # GCP_HOST_KEY는 서버에서 `ssh-keyscan <SERVER_IP>` 출력을 Secrets에 저장
          echo "$GCP_HOST_KEY" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # ── Step 1: 배포 전 스냅샷 ──
      - name: Pre-deploy snapshot
        id: snapshot
        env:
          SERVER_IP: ${{ secrets.GCP_SERVER_IP }}
          SERVER_USER: ${{ secrets.GCP_SERVER_USER }}
        run: |
          PREV_SHA=$(ssh -i ~/.ssh/gcp_key ${SERVER_USER}@${SERVER_IP} \
            "cd ~/aqts && git rev-parse --short HEAD 2>/dev/null || echo 'none'" | tail -1)
          echo "previous_sha=${PREV_SHA}" >> $GITHUB_OUTPUT
          echo "📸 Pre-deploy snapshot: commit=${PREV_SHA}"

      # ── Step 2: 배포 실행 (cosign verify + GHCR pull + up) ──
      # 주: docker compose build 는 더 이상 사용하지 않는다. CI 가 GHCR 에
      # push + cosign keyless 서명한 이미지를 서버가 검증 후 pull 한다.
      - name: Deploy to server
        id: deploy
        env:
          SERVER_IP: ${{ secrets.GCP_SERVER_IP }}
          SERVER_USER: ${{ secrets.GCP_SERVER_USER }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          IMAGE_TAG: sha-${{ github.event.workflow_run.head_sha }}
          REPO_FULL: ${{ github.repository }}
          COSIGN_VERSION: ${{ env.COSIGN_VERSION }}
        run: |
          # 7자리 short sha 로 정규화 (CI metadata-action 의 type=sha 와 동일)
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          IMAGE_TAG="sha-${SHORT_SHA}"
          IMAGE_REF="ghcr.io/${IMAGE_NAMESPACE}/aqts-backend:${IMAGE_TAG}"
          echo "Deploy target: ${IMAGE_REF}"
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

          ssh -T -i ~/.ssh/gcp_key ${SERVER_USER}@${SERVER_IP} \
            IMAGE_NAMESPACE="${IMAGE_NAMESPACE}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            IMAGE_REF="${IMAGE_REF}" \
            REPO_FULL="${REPO_FULL}" \
            COSIGN_VERSION="${COSIGN_VERSION}" \
            bash -s << 'DEPLOY_SCRIPT'
            set -e
            cd ~/aqts

            echo "═══ Step 1: Sync compose/config to origin/main ═══"
            # 배포 서버는 remote main 의 팔로워이므로 local merge/rebase 는
            # 절대 수행하지 않는다. `git pull` 은 force-push (amend, rebase)
            # 이후 "divergent branches" 로 실패하므로 fetch + reset --hard
            # 패턴을 사용한다. 이 패턴은 rollback 경로와도 동일하여 경로별
            # 불일치가 없다. `git reset --hard` 는 tracked 파일만 건드리므로
            # 서버의 .env, data 볼륨, 로그 등 untracked 자산은 보존된다.
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main

            echo "═══ Step 2: Ensure cosign installed ═══"
            if ! command -v cosign >/dev/null 2>&1; then
              echo "cosign 미설치 → 설치 진행 (${COSIGN_VERSION})"
              curl -sSLo /tmp/cosign \
                "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
              sudo install -m 0755 /tmp/cosign /usr/local/bin/cosign
              rm -f /tmp/cosign
            fi
            cosign version

            echo "═══ Step 3: Verify image signature (cosign keyless) ═══"
            # CI 가 GitHub Actions OIDC 신원으로 keyless 서명한 이미지만 통과
            cosign verify \
              --certificate-identity-regexp "^https://github.com/${REPO_FULL}/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${IMAGE_REF}" > /tmp/cosign-verify.json
            echo "✅ Signature verified for ${IMAGE_REF}"

            echo "═══ Step 4: Pull verified image from GHCR ═══"
            docker pull "${IMAGE_REF}"

            # backend 와 scheduler 는 동일 이미지/digest 를 공유해야 한다.
            # pull 직후의 로컬 digest 를 EXPECTED_IMAGE_ID 로 잠가두고,
            # 이후 단계에서 두 컨테이너가 실제로 이 digest 를 실행 중인지
            # 어서트한다. 2026-04-08 회귀(scheduler 가 a93fd8e 이전 이미지로
            # 계속 동작한 사건)의 재발 방지.
            EXPECTED_IMAGE_ID=$(docker image inspect "${IMAGE_REF}" --format '{{.Id}}')
            if [ -z "${EXPECTED_IMAGE_ID}" ]; then
              echo "❌ pulled image digest 를 읽지 못했다 (docker image inspect 실패)"
              exit 1
            fi
            echo "EXPECTED_IMAGE_ID=${EXPECTED_IMAGE_ID}"

            echo "═══ Step 5a: Ensure postgres is up for migrations ═══"
            export IMAGE_NAMESPACE IMAGE_TAG
            docker compose -f docker-compose.yml up -d postgres

            echo "═══ Step 5b: Detect alembic baseline (init_db.sql 호환) ═══"
            # init_db.sql 로 부트스트랩된 DB 는 alembic_version 이 비어 있다.
            # 그 상태에서 곧바로 upgrade head 를 돌리면 001 이 market_ohlcv 를
            # CREATE TABLE 하다 DuplicateTable 로 실패한다 (회귀 사례 #24165328003).
            # 따라서 실제 스키마 상태를 관찰하여 가장 높은 일치 리비전으로 stamp 한 뒤
            # upgrade 를 진행한다. 판별 매트릭스는 각 마이그레이션 파일을 직접 grep
            # 으로 검증한 결과를 코드화한 것이다 (002→roles/users, 003→order_idempotency_keys,
            # 004→users.role_version 컬럼, 005→portfolio_positions).
            # 2026-04-09 회귀 (a48c4c8/6500bcb/051c453): 과거 이 줄은
            # `docker exec -i` 를 사용했는데, `ssh -T ... bash -s << 'DEPLOY'`
            # 컨텍스트에서 `bash -s` 는 heredoc 을 stdin 으로 스트리밍하며
            # 한 줄씩 파싱한다. `-i` 로 실행된 docker exec 은 부모 bash 의
            # fd 0 을 상속받아 heredoc 의 나머지 전체를 소비해버리므로,
            # 이 줄 이후의 Step 5c (alembic), 5d (force-recreate),
            # 5e (digest assert), Step 6 (health) 이 한 줄도 실행되지
            # 않은 채 bash 가 EOF 로 clean exit 했다. 외부에서는
            # `Deploy to server ✓ 9s` 로만 보여 드리프트가 은폐되었고,
            # Step 5e 의 어설션도 애초에 실행되지 않았으므로
            # "정의했다 ≠ 적용했다" 가 RBAC Wiring Rule 과 동일한 형태로
            # CD 파이프라인에서 재현됐다.
            # 재발 방지: 비대화형 exec 에는 `-i` 를 쓰지 않고, 방어적으로
            # `< /dev/null` 로 stdin 을 명시 격리한다. 아래 모든
            # `docker exec` 호출에 동일 패턴을 적용한다.
            HAS_VER=$(docker exec aqts-postgres bash -c '
              psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "
                SELECT 1 FROM information_schema.tables
                 WHERE table_schema = '"'"'public'"'"' AND table_name = '"'"'alembic_version'"'"';
              "' </dev/null | tr -d '[:space:]')
            if [ "$HAS_VER" = "1" ]; then
              echo "alembic_version exists → skip baseline stamp"
            else
              echo "alembic_version 부재 → 스키마 관찰 후 baseline 결정"
              SCHEMA=$(docker exec aqts-postgres bash -c '
                psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "
                  SELECT
                    (SELECT COUNT(*) FROM information_schema.tables
                       WHERE table_schema='"'"'public'"'"' AND table_name='"'"'market_ohlcv'"'"'),
                    (SELECT COUNT(*) FROM information_schema.tables
                       WHERE table_schema='"'"'public'"'"' AND table_name='"'"'users'"'"'),
                    (SELECT COUNT(*) FROM information_schema.tables
                       WHERE table_schema='"'"'public'"'"' AND table_name='"'"'order_idempotency_keys'"'"'),
                    (SELECT COUNT(*) FROM information_schema.columns
                       WHERE table_schema='"'"'public'"'"' AND table_name='"'"'users'"'"' AND column_name='"'"'role_version'"'"'),
                    (SELECT COUNT(*) FROM information_schema.tables
                       WHERE table_schema='"'"'public'"'"' AND table_name='"'"'portfolio_positions'"'"');
                "' </dev/null)
              # SCHEMA 형식: "n1|n2|n3|n4|n5"
              IFS='|' read -r HAS_OHLCV HAS_USERS HAS_IDEMP HAS_ROLEVER HAS_PORTFOLIO <<< "$(echo "$SCHEMA" | tr -d '[:space:]')"
              echo "schema observed: ohlcv=$HAS_OHLCV users=$HAS_USERS idemp=$HAS_IDEMP role_ver=$HAS_ROLEVER portfolio=$HAS_PORTFOLIO"
              if [ "$HAS_OHLCV" != "1" ]; then
                echo "❌ market_ohlcv 부재 — init_db.sql 도 적용되지 않은 빈 DB. 운영 환경에서는 발생할 수 없는 상태이므로 중단."
                exit 1
              fi
              if [ "$HAS_PORTFOLIO" = "1" ]; then
                BASELINE=005
              elif [ "$HAS_ROLEVER" = "1" ]; then
                BASELINE=004
              elif [ "$HAS_IDEMP" = "1" ]; then
                BASELINE=003
              elif [ "$HAS_USERS" = "1" ]; then
                BASELINE=002
              else
                BASELINE=001
              fi
              echo "→ alembic stamp $BASELINE"
              # 2026-04-09 회귀 (8fcd6c6 배포): `docker compose run` 은 기본적으로
              # stdin 을 attach 한다. `ssh -T ... bash -s << 'DEPLOY'` heredoc 컨텍스트
              # 안에서는 부모 bash 의 fd 0 을 자식이 상속받아 heredoc 의 나머지 줄을
              # 모두 소진하므로, 이 줄 이후의 Step 5c/5d/5e/6 이 실행되지 않은 채
              # 부모 bash 가 EOF → exit 0 으로 clean exit 한다. Step 5b 의
              # `docker exec -i` 회귀와 동일 메커니즘이며, "docker exec 만 고치면
              # 된다"는 일반화 누락이 직접 원인이다. 재발 방지: `-T` 로 TTY 할당을
              # 끄고, 방어적으로 `</dev/null` 로 stdin 을 명시 격리한다.
              docker compose -f docker-compose.yml run --rm -T backend \
                alembic -c alembic.ini stamp "$BASELINE" </dev/null
            fi

            echo "═══ Step 5c: Run alembic upgrade head ═══"
            # 마이그레이션 실패 시 backend 컨테이너는 기동하지 않는다 (fail-closed).
            # `-T` + `</dev/null` 근거는 Step 5b 의 stamp 호출 주석 참조
            # (2026-04-09 8fcd6c6 배포 회귀).
            docker compose -f docker-compose.yml run --rm -T backend \
              alembic -c alembic.ini upgrade head </dev/null

            echo "═══ Step 5d: Restart services with new image (atomic recreate) ═══"
            # backend 와 scheduler 는 동일 이미지 태그를 공유하므로, compose 가
            # "변경 없음" 으로 판단하여 한쪽만 recreate 하거나 skip 할 위험을
            # 제거하기 위해 --force-recreate 로 명시한다. 이는 두 컨테이너가
            # 같은 EXPECTED_IMAGE_ID 를 실행 중임을 보장하기 위한 첫 번째 장치.
            docker compose -f docker-compose.yml up -d --force-recreate --no-deps backend scheduler
            docker compose -f docker-compose.yml up -d

            echo "═══ Step 5e: Assert atomic digest (backend ↔ scheduler) ═══"
            # 두 컨테이너의 실행 중 image digest 가 EXPECTED_IMAGE_ID 와 일치하는지
            # 확인한다. 하나라도 불일치면 배포를 실패시켜 rollback 경로로 진입한다.
            BACKEND_IMAGE_ID=$(docker inspect --format '{{.Image}}' aqts-backend 2>/dev/null || echo "")
            SCHEDULER_IMAGE_ID=$(docker inspect --format '{{.Image}}' aqts-scheduler 2>/dev/null || echo "")
            echo "BACKEND_IMAGE_ID=${BACKEND_IMAGE_ID}"
            echo "SCHEDULER_IMAGE_ID=${SCHEDULER_IMAGE_ID}"
            if [ "${BACKEND_IMAGE_ID}" != "${EXPECTED_IMAGE_ID}" ]; then
              echo "❌ backend image drift: expected ${EXPECTED_IMAGE_ID}, got ${BACKEND_IMAGE_ID}"
              exit 1
            fi
            if [ "${SCHEDULER_IMAGE_ID}" != "${EXPECTED_IMAGE_ID}" ]; then
              echo "❌ scheduler image drift: expected ${EXPECTED_IMAGE_ID}, got ${SCHEDULER_IMAGE_ID}"
              exit 1
            fi
            echo "✅ atomic digest asserted — backend ↔ scheduler ↔ pulled image 일치"

            echo "═══ Step 6: Wait for health check (max 120s) ═══"
            for i in $(seq 1 60); do
              if curl -sf http://localhost:8000/api/system/health > /dev/null 2>&1; then
                echo "✅ Backend healthy after $((i*2))s"
                exit 0
              fi
              sleep 2
            done

            echo "❌ Health check failed after 120s"
            docker compose logs backend --tail=50
            exit 1
          DEPLOY_SCRIPT

      # ── Step 3: 배포 후 검증 ──
      - name: Post-deploy verification
        id: verify
        env:
          SERVER_IP: ${{ secrets.GCP_SERVER_IP }}
          SERVER_USER: ${{ secrets.GCP_SERVER_USER }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          IMAGE_TAG: sha-${{ steps.snapshot.outputs.short_sha || github.sha }}
        run: |
          # heredoc 을 unquoted (VERIFY_SCRIPT) 로 두어 GA 컨텍스트 변수가 inline 치환되도록 한다.
          # docker-compose.yml 이 IMAGE_NAMESPACE 를 required 변수로 요구하므로
          # 원격 셸에서 export 된 상태여야 `docker compose ps` 가 동작한다.
          ssh -T -i ~/.ssh/gcp_key ${SERVER_USER}@${SERVER_IP} bash -s <<VERIFY_SCRIPT
            set -e
            cd ~/aqts
            export IMAGE_NAMESPACE="${IMAGE_NAMESPACE}"
            export IMAGE_TAG="${IMAGE_TAG}"

            echo "═══ Health Check ═══"
            HEALTH=\$(curl -sf http://localhost:8000/api/system/health)
            echo "Health: \$HEALTH"

            echo "═══ Container Status ═══"
            TOTAL=\$(docker compose ps -a --format '{{.Name}}' | wc -l)
            RUNNING=\$(docker compose ps --status running --format '{{.Name}}' | wc -l)
            echo "Running containers: \$RUNNING/\$TOTAL"

            # 핵심 서비스 최소 4개 (postgres, mongodb, redis, backend)
            if [ "\$RUNNING" -lt 4 ]; then
              echo "❌ Core containers not running (minimum 4 required)"
              docker compose ps
              exit 1
            fi

            echo "═══ Version Check ═══"
            # 2026-04-09 §4.10: "Deployed commit" 은 git HEAD 가 아니라
            # **실제로 실행 중인 backend 컨테이너의 revision label** 에서
            # 읽는다. §4.7/§4.8 회귀에서는 서버 git 은 새 SHA 로 reset 된
            # 상태였지만 컨테이너는 구 이미지로 고정되어 있었고, git HEAD
            # 를 찍는 기존 로그는 "새 커밋이 배포됐다" 는 위양성을 만들었다.
            # 컨테이너 라벨은 CI 빌드 시점의 git SHA 이므로 실제 실행
            # 이미지와 1:1 로 묶인다. 라벨 부재는 CI metadata-action 구성
            # 위반이므로 즉시 실패시킨다.
            DEPLOYED_SHA=\$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' aqts-backend 2>/dev/null || echo "")
            if [ -z "\${DEPLOYED_SHA}" ]; then
              echo "❌ aqts-backend 에 org.opencontainers.image.revision 라벨이 없음 — CI metadata-action 구성 확인 필요"
              exit 1
            fi
            SERVER_SHA=\$(git rev-parse HEAD)
            echo "Deployed commit:  \${DEPLOYED_SHA:0:12} (from container label)"
            echo "Server git HEAD:  \${SERVER_SHA:0:12}"
            if [ "\${DEPLOYED_SHA}" != "\${SERVER_SHA}" ]; then
              echo "❌ server drift: 컨테이너 revision 이 서버 git HEAD 와 다름 (force-recreate 누락 가능성)"
              exit 1
            fi

            echo "═══ Atomic Digest Cross-Check (backend ↔ scheduler) ═══"
            # 배포 단계의 Step 5e 와 독립적으로, verify 단계에서도 두 컨테이너가
            # 동일 image digest 를 실행 중인지 다시 확인한다. Step 5e 이후 수동
            # 개입 / 부분 재시작 등으로 drift 가 발생했는지 잡아내기 위한
            # 2중 방어선. 2026-04-08 회귀 재발 방지.
            BACKEND_IMAGE_ID=\$(docker inspect --format '{{.Image}}' aqts-backend 2>/dev/null || echo "")
            SCHEDULER_IMAGE_ID=\$(docker inspect --format '{{.Image}}' aqts-scheduler 2>/dev/null || echo "")
            echo "backend  image=\${BACKEND_IMAGE_ID}"
            echo "scheduler image=\${SCHEDULER_IMAGE_ID}"
            if [ -z "\${BACKEND_IMAGE_ID}" ] || [ -z "\${SCHEDULER_IMAGE_ID}" ]; then
              echo "❌ backend 또는 scheduler 컨테이너를 찾을 수 없음"
              exit 1
            fi
            if [ "\${BACKEND_IMAGE_ID}" != "\${SCHEDULER_IMAGE_ID}" ]; then
              echo "❌ image drift detected: backend ↔ scheduler digest mismatch"
              exit 1
            fi
            echo "✅ backend ↔ scheduler 동일 digest 확인"

            echo "═══ Post-deploy smoke test ═══"
            # scripts/post_deploy_smoke.sh 는 git reset --hard 단계(Step 1)에서
            # 이미 서버에 동기화되어 있다. 본 smoke 는 heartbeat 신선도,
            # scheduler healthcheck 구성 정합성 등 docker inspect 만으로는
            # 잡히지 않는 2026-04-08 회귀 contract 를 최종 강제한다.
            #
            # 2026-04-09 §4.11: `</dev/null` 필수. 이 호출은 VERIFY_SCRIPT
            # heredoc 내부이므로 자식 bash 가 부모 fd 0(=heredoc 스트림)을
            # 상속한다. smoke 스크립트가 현재는 `docker exec -i` 같은 stdin
            # 소비 패턴을 갖고 있지 않지만, 장래에 한 줄이라도 추가되면
            # §4.7/§4.8 과 동일한 은폐 경로가 재생성된다. 상속 사슬을 호출
            # 지점에서 끊어 smoke 의 내부 변경과 무관하게 VERIFY_SCRIPT 잔여
            # 라인이 보호되도록 한다.
            bash scripts/post_deploy_smoke.sh </dev/null

            echo "✅ All verification checks passed"
          VERIFY_SCRIPT

      # ── Step 4: 실패 시 자동 롤백 ──
      # 이전 SHA 의 이미지를 GHCR 에서 verify + pull (서명 검증 동일 강제)
      - name: Rollback on failure
        if: failure() && steps.snapshot.outputs.previous_sha != 'none'
        env:
          SERVER_IP: ${{ secrets.GCP_SERVER_IP }}
          SERVER_USER: ${{ secrets.GCP_SERVER_USER }}
          PREV_SHA: ${{ steps.snapshot.outputs.previous_sha }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          REPO_FULL: ${{ github.repository }}
        run: |
          echo "🔄 Rolling back to ${PREV_SHA}..."
          ssh -T -i ~/.ssh/gcp_key ${SERVER_USER}@${SERVER_IP} \
            IMAGE_NAMESPACE="${IMAGE_NAMESPACE}" \
            PREV_SHA="${PREV_SHA}" \
            REPO_FULL="${REPO_FULL}" \
            bash -s << 'ROLLBACK_SCRIPT'
            set -e
            cd ~/aqts

            # PREV_SHA 는 short sha 로 가정 (snapshot 단계에서 git rev-parse --short)
            IMAGE_TAG="sha-${PREV_SHA}"
            IMAGE_REF="ghcr.io/${IMAGE_NAMESPACE}/aqts-backend:${IMAGE_TAG}"

            echo "═══ Rollback: reverting compose/config to ${PREV_SHA} ═══"
            git fetch origin main
            git reset --hard ${PREV_SHA}

            echo "═══ Verify previous image signature ═══"
            # 10위(SBOM/cosign) 도입 이전 SHA 는 GHCR 에 이미지/서명이 모두 없을 수 있다.
            # 이 경우 manifest_unknown 을 graceful 처리하고 rollback 을 중단한다 —
            # 이는 의도적 한계이며, 10위 머지 이후 두 번째 배포부터는 정상 작동한다.
            if ! docker manifest inspect "${IMAGE_REF}" > /dev/null 2>&1; then
              echo "⚠️  Previous image ${IMAGE_REF} not found in GHCR (pre-10위 commit)."
              echo "⚠️  Skipping rollback — manual intervention required."
              exit 0
            fi
            cosign verify \
              --certificate-identity-regexp "^https://github.com/${REPO_FULL}/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${IMAGE_REF}" > /tmp/cosign-rollback.json
            echo "✅ Rollback image signature verified"

            echo "═══ Pull previous image + restart (atomic recreate) ═══"
            docker pull "${IMAGE_REF}"
            EXPECTED_IMAGE_ID=$(docker image inspect "${IMAGE_REF}" --format '{{.Id}}')
            if [ -z "${EXPECTED_IMAGE_ID}" ]; then
              echo "❌ rollback: pulled image digest 를 읽지 못했다"
              exit 1
            fi
            echo "rollback EXPECTED_IMAGE_ID=${EXPECTED_IMAGE_ID}"
            export IMAGE_NAMESPACE IMAGE_TAG
            # 배포 경로와 동일하게 --force-recreate 로 backend/scheduler 를
            # 원자적으로 교체한다. 롤백 경로에서도 image drift 재발을 방지.
            docker compose -f docker-compose.yml up -d --force-recreate --no-deps backend scheduler
            docker compose -f docker-compose.yml up -d

            echo "═══ Rollback: assert atomic digest ═══"
            BACKEND_IMAGE_ID=$(docker inspect --format '{{.Image}}' aqts-backend 2>/dev/null || echo "")
            SCHEDULER_IMAGE_ID=$(docker inspect --format '{{.Image}}' aqts-scheduler 2>/dev/null || echo "")
            if [ "${BACKEND_IMAGE_ID}" != "${EXPECTED_IMAGE_ID}" ] || [ "${SCHEDULER_IMAGE_ID}" != "${EXPECTED_IMAGE_ID}" ]; then
              echo "❌ rollback image drift: expected=${EXPECTED_IMAGE_ID} backend=${BACKEND_IMAGE_ID} scheduler=${SCHEDULER_IMAGE_ID}"
              exit 1
            fi
            echo "✅ rollback atomic digest asserted"

            echo "═══ Wait for health check (max 120s) ═══"
            for i in $(seq 1 60); do
              if curl -sf http://localhost:8000/api/system/health > /dev/null 2>&1; then
                echo "✅ Rollback healthy after $((i*2))s"
                break
              fi
              sleep 2
            done

            RUNNING=$(docker compose ps --format '{{.Name}} {{.Status}}' | grep -c "Up" || true)
            echo "Running containers after rollback: $RUNNING/4"
            echo "═══ Rollback complete ═══"
          ROLLBACK_SCRIPT

      # ── Step 5: Telegram 알림 ──
      - name: Notify deployment (Telegram)
        if: always()
        env:
          SERVER_IP: ${{ secrets.GCP_SERVER_IP }}
          SERVER_USER: ${{ secrets.GCP_SERVER_USER }}
          DEPLOY_STATUS: ${{ job.status }}
          PREV_SHA: ${{ steps.snapshot.outputs.previous_sha }}
        run: |
          ssh -T -i ~/.ssh/gcp_key ${SERVER_USER}@${SERVER_IP} bash -s << NOTIFY_SCRIPT
            cd ~/aqts
            source .env 2>/dev/null || true
            STATUS="${DEPLOY_STATUS}"
            CURRENT_SHA=\$(git rev-parse --short HEAD)

            if [ "\$STATUS" = "success" ]; then
              EMOJI="✅"
              DETAIL="배포 성공"
            else
              EMOJI="❌"
              DETAIL="배포 실패 → 롤백 (${PREV_SHA})"
            fi

            MSG="\${EMOJI} AQTS Deploy \${DETAIL}
          Commit: ${GITHUB_SHA:0:7} → \${CURRENT_SHA}
          Branch: main
          Time: \$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S KST')"

            if [ -n "\${TELEGRAM_BOT_TOKEN}" ] && [ -n "\${TELEGRAM_CHAT_ID}" ]; then
              curl -sf "https://api.telegram.org/bot\${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="\${TELEGRAM_CHAT_ID}" \
                -d text="\${MSG}" > /dev/null 2>&1 || true
            fi
          NOTIFY_SCRIPT

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/gcp_key
