# ══════════════════════════════════════════════════════════════
# AQTS CI Pipeline — Lint → Smoke → Full Tests → Docker Build
# ══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ──────────────────────────────────
  # Stage 1: 코드 품질 검사
  # ──────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linters
        run: pip install ruff==0.5.0 black==24.4.2

      - name: Ruff lint
        run: cd backend && ruff check . --config pyproject.toml

      - name: Black format check
        run: cd backend && black --check . --config pyproject.toml

  # ──────────────────────────────────
  # Stage 2: Smoke Tests (빠른 핵심 검증)
  # ──────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run smoke tests
        env:
          TESTING: "true"
          KIS_TRADING_MODE: BACKTEST
        run: |
          cd backend
          python -m pytest tests/ -m smoke -v --tb=short -x

  # ──────────────────────────────────
  # Stage 3: Full Test Suite
  # ──────────────────────────────────
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: smoke

    services:
      postgres:
        image: timescale/timescaledb:2.14.2-pg16
        env:
          POSTGRES_USER: aqts
          POSTGRES_PASSWORD: aqts_ci_test
          POSTGRES_DB: aqts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7.0.9
        env:
          MONGO_INITDB_ROOT_USERNAME: aqts
          MONGO_INITDB_ROOT_PASSWORD: aqts_ci_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2.5-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run full test suite
        env:
          TESTING: "true"
          KIS_TRADING_MODE: BACKTEST
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: aqts
          DB_PASSWORD: aqts_ci_test
          DB_NAME: aqts_test
          MONGO_HOST: localhost
          MONGO_PORT: "27017"
          MONGO_USER: aqts
          MONGO_PASSWORD: aqts_ci_test
          MONGO_DB: aqts_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short \
            --cov=core --cov=config --cov=db --cov=api --cov=contracts \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/test-results.xml
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          cd backend
          python -m pytest tests/ --cov=core --cov=config --cov=db --cov=api --cov=contracts \
            --cov-report=term --cov-fail-under=60 -q --no-header 2>&1 | tail -20 || true

  # ──────────────────────────────────
  # Stage 4: Docker Build 검증
  # ──────────────────────────────────
  docker-build:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: aqts-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify image
        run: |
          # 이미지 존재 확인
          docker image inspect aqts-backend:ci-${{ github.sha }} > /dev/null
          echo "✅ Image built successfully"

          # non-root 사용자 확인 (보안 요건)
          USER=$(docker inspect --format '{{.Config.User}}' aqts-backend:ci-${{ github.sha }})
          if [ "$USER" = "appuser" ] || [ "$USER" = "1000" ]; then
            echo "✅ Non-root user: $USER"
          else
            echo "::error::Container runs as root (user=$USER)"
            exit 1
          fi

          # 헬스체크 설정 확인
          HC=$(docker inspect --format '{{.Config.Healthcheck.Test}}' aqts-backend:ci-${{ github.sha }})
          echo "✅ Healthcheck configured: $HC"

          # 이미지 크기 출력
          SIZE=$(docker image inspect aqts-backend:ci-${{ github.sha }} --format '{{.Size}}' | numfmt --to=iec 2>/dev/null || echo "unknown")
          echo "📦 Image size: $SIZE"
