# ══════════════════════════════════════════════════════════════
# AQTS CI Pipeline — Lint → Smoke → Full Tests → Docker Build
# ══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/aqts-backend (lowercase 강제)
  IMAGE_NAME: ${{ github.repository_owner }}/aqts-backend

jobs:
  # ──────────────────────────────────
  # Stage 1: 코드 품질 검사
  # ──────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linters
        run: pip install ruff==0.5.0 black==24.4.2

      - name: Ruff lint
        run: cd backend && ruff check . --config pyproject.toml

      - name: Black format check
        run: cd backend && black --check . --config pyproject.toml

      # ── Alertmanager 템플릿 렌더링 + amtool check-config ──
      # alertmanager.yml.tmpl 은 docker-compose 의 entrypoint sed 로 렌더링되는
      # 템플릿이다. CI 에서는 더미 env 로 sed 렌더 → schema 검증 → amtool 로
      # alertmanager 스키마 검증한다. 회귀 방지: telegram_configs.chat_id 가
      # int64 가 아닌 문자열로 들어가는 누락(2026-04 회귀)을 잡는다.
      - name: Install PyYAML (alertmanager render check)
        run: pip install pyyaml==6.0.1

      - name: Render alertmanager template (dummy env) and validate schema
        run: |
          set -eu
          export TELEGRAM_BOT_TOKEN="123456:CI_DUMMY_TOKEN"
          export TELEGRAM_CHAT_ID="987654321"
          sed -e 's|${TELEGRAM_BOT_TOKEN}|'"$TELEGRAM_BOT_TOKEN"'|g' \
              -e 's|${TELEGRAM_CHAT_ID}|'"$TELEGRAM_CHAT_ID"'|g' \
              monitoring/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.rendered.yml
          python3 - <<'PY'
          import yaml
          d = yaml.safe_load(open("/tmp/alertmanager.rendered.yml"))
          for r in d["receivers"]:
              tg = r["telegram_configs"][0]
              assert isinstance(tg["chat_id"], int), (
                  f"{r['name']}: chat_id must be int64, got {type(tg['chat_id']).__name__}"
              )
              assert isinstance(tg["bot_token"], str) and tg["bot_token"], (
                  f"{r['name']}: bot_token must be non-empty str"
              )
          print("rendered yaml schema OK")
          PY

      - name: amtool check-config (alertmanager schema)
        run: |
          docker run --rm \
            -v /tmp/alertmanager.rendered.yml:/etc/alertmanager/alertmanager.yml:ro \
            --entrypoint /bin/amtool \
            prom/alertmanager:v0.27.0 \
            check-config /etc/alertmanager/alertmanager.yml

      # ── SCA: Python 의존성 취약점 스캔 (10위 supply-chain) ──
      # pip-audit 는 OSV 데이터베이스 기반 CVE 검사. 화이트리스트는
      # backend/.pip-audit-ignore 에 만료일 + 사유와 함께 기록.
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Python 의존성 CVE 스캔 (pip-audit)
        run: |
          cd backend
          IGNORE_FLAGS=""
          if [ -f .pip-audit-ignore ]; then
            while IFS= read -r line; do
              # 주석/공백 무시
              [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
              VULN_ID=$(echo "$line" | awk '{print $1}')
              IGNORE_FLAGS="$IGNORE_FLAGS --ignore-vuln $VULN_ID"
            done < .pip-audit-ignore
          fi
          pip-audit -r requirements.txt --strict --vulnerability-service osv $IGNORE_FLAGS

  # ──────────────────────────────────
  # Stage 2: Smoke Tests (빠른 핵심 검증)
  # ──────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run smoke tests
        env:
          TESTING: "true"
          KIS_TRADING_MODE: BACKTEST
        run: |
          cd backend
          python -m pytest tests/ -m smoke -v --tb=short -x

  # ──────────────────────────────────
  # Stage 3: Full Test Suite
  # ──────────────────────────────────
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: smoke

    services:
      postgres:
        image: timescale/timescaledb:2.14.2-pg16
        env:
          POSTGRES_USER: aqts
          POSTGRES_PASSWORD: aqts_ci_test
          POSTGRES_DB: aqts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7.0.9
        env:
          MONGO_INITDB_ROOT_USERNAME: aqts
          MONGO_INITDB_ROOT_PASSWORD: aqts_ci_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2.5-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run full test suite
        env:
          TESTING: "true"
          KIS_TRADING_MODE: BACKTEST
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: aqts
          DB_PASSWORD: aqts_ci_test
          DB_NAME: aqts_test
          MONGO_HOST: localhost
          MONGO_PORT: "27017"
          MONGO_USER: aqts
          MONGO_PASSWORD: aqts_ci_test
          MONGO_DB: aqts_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short \
            --cov=core --cov=config --cov=db --cov=api --cov=contracts \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/test-results.xml
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          cd backend
          python -m pytest tests/ --cov=core --cov=config --cov=db --cov=api --cov=contracts \
            --cov-report=term --cov-fail-under=80 -q --no-header 2>&1 | tail -20 || true

  # ──────────────────────────────────────────────────────────────
  # Stage 4: Docker Build + Push + SBOM + Sign (10위 supply-chain)
  # ──────────────────────────────────────────────────────────────
  # PR 에서는 push 없이 build 만 검증, main push 에서는 GHCR push +
  # SBOM 생성 + grype CVE 스캔 + cosign keyless 서명/attestation 수행.
  docker-build:
    name: Docker Build & Sign
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write       # GHCR push
      id-token: write       # cosign keyless OIDC
      security-events: write  # grype SARIF → GitHub Security tab

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Compute apt upgrade date (cache-bust)
        id: apt_date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          # apt 레이어만 일(day)-단위로 cache-bust — debian 보안 피드(deb12uX)
          # 흡수 보장. pip/torch 등 상위 레이어 캐시는 유지된다.
          build-args: |
            APT_UPGRADE_DATE=${{ steps.apt_date.outputs.today }}

      # ── 빌드된 이미지 기본 검증 (non-root, healthcheck) ──
      - name: Verify image attributes
        if: github.ref == 'refs/heads/main'
        run: |
          REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          docker pull "$REF"
          USER=$(docker inspect --format '{{.Config.User}}' "$REF")
          if [ "$USER" != "appuser" ] && [ "$USER" != "1000" ]; then
            echo "::error::Container runs as root (user=$USER)"
            exit 1
          fi
          echo "✅ Non-root user: $USER"
          HC=$(docker inspect --format '{{.Config.Healthcheck.Test}}' "$REF")
          echo "✅ Healthcheck: $HC"
          SIZE=$(docker image inspect "$REF" --format '{{.Size}}' | numfmt --to=iec 2>/dev/null || echo "unknown")
          echo "📦 Image size: $SIZE"

      # ── PR 에서는 load 한 로컬 이미지로만 검증 ──
      - name: Verify image attributes (PR)
        if: github.ref != 'refs/heads/main'
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          USER=$(docker inspect --format '{{.Config.User}}' "$TAG")
          if [ "$USER" != "appuser" ] && [ "$USER" != "1000" ]; then
            echo "::error::Container runs as root (user=$USER)"
            exit 1
          fi
          echo "✅ Non-root user: $USER"

      # ── SBOM 생성 (CycloneDX JSON) — main 에서만 ──
      - name: Generate SBOM (syft)
        if: github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-artifact-retention: 90

      # ── 컨테이너 이미지 CVE 스캔 (grype) ──
      # 1) 사람이 읽을 수 있는 표 출력 (실패해도 다음 단계 진행 — 로그 가시성 목적)
      # 2) SARIF 출력 + fail-on high (실제 게이트)
      # anchore/scan-action@v6 는 최신 grype + 자동 DB 갱신 사용
      # (v3 는 벤더링된 grype v0.74.4 + 묵은 DB 로 max-age 5d 정책에 차단됨).
      - name: List High/Critical CVEs (grype, debug)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          set -e
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.97.1
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          echo "=== Severity counts ==="
          grype "$IMAGE" -o json 2>/dev/null \
            | jq -r '.matches[].vulnerability.severity' \
            | sort | uniq -c | sort -rn
          echo
          echo "=== High/Critical CVEs (with fix availability) ==="
          grype "$IMAGE" -o json 2>/dev/null \
            | jq -r '.matches[]
                | select(.vulnerability.severity == "High" or .vulnerability.severity == "Critical")
                | [.vulnerability.severity, .artifact.name, .artifact.version,
                   (.vulnerability.fix.versions // [] | join(",") | if . == "" then "(no-fix)" else . end),
                   .vulnerability.id] | @tsv' \
            | column -t -s $'\t'

      - name: Scan image for vulnerabilities (grype)
        if: github.ref == 'refs/heads/main'
        uses: anchore/scan-action@v6
        id: grype
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          fail-build: true
          severity-cutoff: high
          only-fixed: false
          output-format: sarif

      - name: Upload grype SARIF to GitHub Security
        if: always() && github.ref == 'refs/heads/main' && hashFiles(steps.grype.outputs.sarif) != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-container-scan

      # ── cosign keyless 서명 (Sigstore Fulcio + Rekor) ──
      # cosign v2.4.0 고정 시 Fulcio OIDC 토큰 파싱 실패(invalid character 'u')
      # 발생. cosign-installer v3.10.1 (cosign v2.6.1 내장)로 업그레이드.
      # COSIGN_EXPERIMENTAL 은 cosign v2 이후 불필요 (--yes 플래그로 대체).
      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3.10.1

      - name: Sign image with cosign (keyless)
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Attach SBOM as cosign attestation
        if: github.ref == 'refs/heads/main'
        run: |
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Verify signature (sanity check)
        if: github.ref == 'refs/heads/main'
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Print image reference for downstream CD
        if: github.ref == 'refs/heads/main'
        run: |
          echo "## 🐳 Built & Signed Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
