# ══════════════════════════════════════════════════════════════════════
# AQTS Prometheus Alert Rules
# ══════════════════════════════════════════════════════════════════════
#
# 알림 심각도:
#   critical — 즉시 대응 (거래 중단/데이터 유실 가능)
#   warning  — 30분 내 확인 (성능 저하/이상 징후)
#   info     — 참고용 (운영 현황 보고)
#
# 메트릭 참조: backend/core/monitoring/metrics.py
#

groups:
  # ─────────────────────────────────────
  # 1. 서비스 가용성 (Service Availability)
  # ─────────────────────────────────────
  - name: aqts_availability
    rules:
      - alert: BackendDown
        expr: up{job="aqts-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AQTS 백엔드 서비스 다운"
          description: "aqts-backend 메트릭 수집이 1분 이상 실패. 서비스가 중단되었거나 /metrics 엔드포인트가 응답하지 않음."
          runbook: "docs/operations/incident-runbook.md"

      - alert: SystemStatusUnhealthy
        expr: aqts_system_status < 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "AQTS 시스템 상태 비정상 ({{ $value }})"
          description: "전체 시스템 상태가 2분 이상 healthy(1.0) 미만. 0.5=degraded, 0=unhealthy."

      - alert: ComponentUnhealthy
        expr: aqts_component_health < 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "컴포넌트 {{ $labels.component }} 상태 비정상 ({{ $value }})"
          description: "{{ $labels.component }} 컴포넌트가 3분 이상 healthy 미만. DB/Redis/Scheduler 연결 확인 필요."

  # ─────────────────────────────────────
  # 2. API 성능 (API Performance)
  # ─────────────────────────────────────
  - name: aqts_api_performance
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(aqts_http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(aqts_http_requests_total[5m]))
          ) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx 에러율 {{ $value | humanizePercentage }} (임계값: 5%)"
          description: "3분 이상 5xx 에러율이 5%를 초과. 카나리 롤백 트리거 기준과 동일."
          runbook: "docs/operations/rollback-plan.md"

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(aqts_http_request_duration_seconds_bucket[5m])) by (le))
          > 3.0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "API p95 레이턴시 {{ $value | humanizeDuration }} (임계값: 3s)"
          description: "3분 이상 p95 응답 시간이 3초를 초과. 카나리 롤백 트리거 기준과 동일."

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(aqts_http_request_duration_seconds_bucket[5m])) by (le))
          > 10.0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API p99 레이턴시 {{ $value | humanizeDuration }} (임계값: 10s)"
          description: "2분 이상 p99 응답 시간이 10초를 초과. 타임아웃 또는 리소스 고갈 가능성."

      - alert: NoTrafficReceived
        expr: |
          sum(rate(aqts_http_requests_total[10m])) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "10분간 API 트래픽 없음"
          description: "10분 이상 HTTP 요청이 0. 서비스 접근 불가 또는 클라이언트 장애 의심."

  # ─────────────────────────────────────
  # 3. 서킷브레이커 (Circuit Breaker)
  # ─────────────────────────────────────
  - name: aqts_circuit_breaker
    rules:
      - alert: CircuitBreakerOpen
        expr: aqts_circuit_breaker_state == 1
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "서킷브레이커 OPEN: {{ $labels.service }}"
          description: "{{ $labels.service }} 서킷브레이커가 OPEN 상태. 외부 서비스 연결 차단 중. 해당 서비스 장애 확인 필요."
          runbook: "docs/operations/incident-runbook.md"

      - alert: CircuitBreakerHalfOpen
        expr: aqts_circuit_breaker_state == 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "서킷브레이커 HALF-OPEN: {{ $labels.service }}"
          description: "{{ $labels.service }} 서킷브레이커가 2분 이상 HALF-OPEN 유지. 외부 서비스 불안정."

      - alert: CircuitBreakerFailureSpike
        expr: |
          rate(aqts_circuit_breaker_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "서킷브레이커 실패 급증: {{ $labels.service }} ({{ $value }}/s)"
          description: "{{ $labels.service }}의 실패율이 2분 이상 0.1/s 초과. OPEN 전환 임박."

  # ─────────────────────────────────────
  # 4. 데이터 수집 (Data Collection)
  # ─────────────────────────────────────
  - name: aqts_data_collection
    rules:
      - alert: DataCollectionErrors
        expr: |
          rate(aqts_data_collection_errors_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "데이터 수집 에러 발생: {{ $labels.source }}"
          description: "{{ $labels.source }} 수집에서 10분 이상 지속적 에러 발생. 외부 API 상태 확인 필요."

      - alert: DataCollectionSlow
        expr: |
          histogram_quantile(0.95, rate(aqts_data_collection_duration_seconds_bucket[15m])) > 120
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "데이터 수집 지연: {{ $labels.source }} (p95 > 120s)"
          description: "{{ $labels.source }} 수집 p95 소요시간이 120초 초과. 네트워크 또는 소스 API 성능 확인."

  # ─────────────────────────────────────
  # 5. 트레이딩 비즈니스 메트릭
  # ─────────────────────────────────────
  - name: aqts_trading
    rules:
      - alert: DailyReturnExtreme
        expr: |
          abs(aqts_daily_return_pct) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "일일 수익률 극단값: {{ $value }}%"
          description: "일일 수익률이 ±5%를 초과. 비정상 시장 또는 알고리즘 이상 가능."

      - alert: PortfolioValueDrop
        expr: |
          (aqts_portfolio_value_krw - aqts_portfolio_value_krw offset 1h)
          / aqts_portfolio_value_krw offset 1h
          < -0.03
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "포트폴리오 가치 1시간 내 3% 이상 하락"
          description: "포트폴리오 가치가 1시간 동안 3% 이상 급락. 리스크 관리 상태 확인 필요."
          runbook: "docs/operations/trading-halt-policy.md"

      - alert: NoSignalsGenerated
        expr: |
          rate(aqts_signals_generated_total[1h]) == 0
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "2시간 동안 시그널 미생성"
          description: "장중 2시간 이상 시그널이 생성되지 않음. 파이프라인 또는 데이터 수집 상태 확인."

      - alert: LowEnsembleConfidence
        expr: aqts_ensemble_confidence < 0.3
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "앙상블 신뢰도 낮음: {{ $value }}"
          description: "30분 이상 앙상블 신뢰도가 0.3 미만 유지. 시장 불확실성 또는 전략 성능 저하 가능."

  # ─────────────────────────────────────
  # 6. KIS 자동 복원 (KIS Recovery)
  # ─────────────────────────────────────
  #
  # 운영자에게 도달하는 유일한 알림 경로다. `backend/main.py` 의
  # `_kis_alert_callback` → `AlertManager.create_and_persist_alert` 는 현재
  # MongoDB 영속화까지만 수행하고 Telegram/webhook 과 wiring 되어 있지 않다
  # (docs/operations/alerting-audit-2026-04.md §0, §2 참조). 따라서 이 그룹의
  # 룰이 Prometheus → AlertManager → Telegram 체인으로 발화되는 것이 운영자
  # 알림의 유일한 in-band 경로다. wiring 복구 전까지 이 룰은 단일 장애점이다.
  #
  # 관련 문서:
  #   - docs/operations/kis-degraded-recovery.md
  #   - docs/operations/alerting-audit-2026-04.md
  - name: aqts_kis_recovery
    rules:
      - alert: KISDegraded
        expr: aqts_kis_degraded == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "KIS API degraded 상태 지속 ({{ $value }})"
          description: "KIS API 가 2분 이상 degraded 상태. 자동 복원(health_check 주기적 시도) 진행 중. 10분 이상 지속되면 KISDegradedProlonged 로 승격."
          runbook: "docs/operations/kis-degraded-recovery.md"

      - alert: KISDegradedProlonged
        expr: aqts_kis_degraded == 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "KIS API degraded 10분 이상 지속"
          description: "자동 복원이 10분 이상 실패. 운영자가 KIS appkey/appsecret, 레이트리밋 상태를 직접 확인해야 함. 본 Prometheus 경로가 유일한 운영자 알림 경로다 (앱 내부 AlertManager 는 Mongo 영속화 전용이며 Telegram 과 wiring 되어 있지 않음 — docs/operations/alerting-audit-2026-04.md §0, §2)."
          runbook: "docs/operations/kis-degraded-recovery.md"

      - alert: KISRecoveryAttemptsSpike
        expr: |
          rate(aqts_kis_recovery_attempts_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "KIS 복원 시도 빈도 급증 ({{ $value | humanize }}/s)"
          description: "5분 이상 KIS 복원 시도율이 0.05/s (≈ 15회/5분) 초과. 쿨다운(75s) 기준으로는 반복 실패 상태. alert_threshold 도달 여부 확인."

      - alert: KISRecoveryStalling
        expr: |
          (
            increase(aqts_kis_recovery_attempts_total[15m]) > 5
            and
            increase(aqts_kis_recovery_success_total[15m]) == 0
          )
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "KIS 복원 정체: 15분간 시도 {{ $value }}+ 회, 성공 0"
          description: "최근 15분 동안 5회 이상 복원을 시도했지만 단 1건도 성공하지 못함. KIS 서비스 자체 장애 또는 appkey/appsecret 문제 가능성. 수동 개입 필요."
          runbook: "docs/operations/kis-degraded-recovery.md"

  # ═══════════════════════════════════════════════════════════════
  # P1-알람 규칙: 보안/정합성 계층 (security-integrity-roadmap §9)
  # P0-1/2a/2b/3a/3b/4/5 + P1-정합성/보안 에서 instrument 된
  # 모든 fail-closed 카운터/게이지에 대해 1:1 알람을 정의한다.
  # 알람 없는 metric 은 형식적 통제에 불과하다는 원칙의 적용.
  # ═══════════════════════════════════════════════════════════════
  - name: aqts_security_integrity
    interval: 30s
    rules:
      # ─────────────────────────────────────────────────
      # P0-5: TradingGuard → OrderExecutor wiring
      # ─────────────────────────────────────────────────
      - alert: TradingGuardKillSwitchActive
        expr: aqts_trading_guard_kill_switch_active == 1
        for: 0m
        labels:
          severity: critical
          domain: integrity
        annotations:
          summary: "TradingGuard kill switch 활성화 — 모든 주문 차단 중"
          description: "프로세스 전역 TradingGuard kill switch 가 활성 상태. OrderExecutor.execute_order 가 TradingGuardBlocked 를 발생시키며 모든 신규 주문을 즉시 거부한다. 원인 (일일 손실 / MDD / 연속 손실 / 수동 kill) 을 확인하고 해제는 수동으로만 수행한다."
          runbook: "docs/security/security-integrity-roadmap.md#p0-5"

      - alert: TradingGuardBlocksSpike
        expr: |
          sum by (reason_code) (
            increase(aqts_trading_guard_blocks_total[5m])
          ) > 5
        for: 2m
        labels:
          severity: warning
          domain: integrity
        annotations:
          summary: "TradingGuard 차단 {{ $labels.reason_code }} 급증 ({{ $value }}건/5분)"
          description: "최근 5분 동안 reason_code={{ $labels.reason_code }} 로 5건 이상 차단. 정상 운영 중이면 주문 로직이 guard 조건을 반복 건드리는 상황으로 의심되므로 상위 전략 점검 필요."

      # ─────────────────────────────────────────────────
      # P0-4: 감사 로그 fail-closed
      # ─────────────────────────────────────────────────
      - alert: AuditWriteFailureStrict
        expr: |
          increase(aqts_audit_write_failures_total{mode="strict"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          domain: security
        annotations:
          summary: "감사 로그 strict 쓰기 실패 발생 — 주문 경로 503 중"
          description: "금전 쓰기 경로(log_strict)에서 감사 DB 쓰기가 실패했다. 핵심 불변식 '감사 레코드 없는 브로커 실행 불가'를 지키기 위해 주문 API 가 503 AUDIT_UNAVAILABLE 를 반환하고 있을 가능성이 높다. 알람 임계는 0 — 단 1건도 허용하지 않는다."
          runbook: "docs/security/security-integrity-roadmap.md#p0-4"

      - alert: AuditWriteFailureSoftSpike
        expr: |
          sum(increase(aqts_audit_write_failures_total{mode="soft"}[15m])) > 10
        for: 5m
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "감사 로그 soft 쓰기 실패 급증 ({{ $value }}건/15분)"
          description: "읽기/통계 경로의 log() 에서 감사 쓰기가 반복 실패. 직접 주문 실행을 막지는 않지만, audit DB 의 부하/디스크/복제 지연을 확인해야 한다."

      # ─────────────────────────────────────────────────
      # P0-3a/3b: 주문 idempotency
      # ─────────────────────────────────────────────────
      - alert: OrderIdempotencyStoreUnavailable
        expr: |
          sum by (op) (
            increase(aqts_order_idempotency_store_failure_total[5m])
          ) > 0
        for: 1m
        labels:
          severity: critical
          domain: integrity
        annotations:
          summary: "주문 idempotency store 장애 ({{ $labels.op }})"
          description: "주문 경로 idempotency store 가 {{ $labels.op }} 단계에서 실패 중. fail-closed 정책에 따라 주문 API 는 503 IDEMPOTENCY_STORE_UNAVAILABLE 를 반환한다. Redis / Postgres order_idempotency_keys 상태를 확인하라."
          runbook: "docs/security/security-integrity-roadmap.md#p0-3"

      # ─────────────────────────────────────────────────
      # P0-1: refresh 토큰 type 강제 검증
      # ─────────────────────────────────────────────────
      - alert: AccessTokenReusedForRefresh
        expr: |
          sum by (reason) (
            increase(aqts_token_refresh_from_access_total[10m])
          ) > 0
        for: 0m
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "refresh 엔드포인트에 비정상 토큰 전달 ({{ $labels.reason }})"
          description: "최근 10분 내 refresh 엔드포인트가 access / 타입 누락 토큰으로 호출되었다. 정상 클라이언트는 발생 불가 — 공격 시도 또는 클라이언트 버그일 수 있다."

      # ─────────────────────────────────────────────────
      # P0-2a: Token revocation store
      # ─────────────────────────────────────────────────
      - alert: RevocationBackendUnavailable
        expr: |
          sum by (op) (
            increase(aqts_revocation_backend_failure_total[5m])
          ) > 0
        for: 1m
        labels:
          severity: critical
          domain: security
        annotations:
          summary: "Token revocation backend 장애 ({{ $labels.op }})"
          description: "TokenRevocationStore 가 실패 중. fail-closed 에 의해 인증 요청이 503 으로 차단된다. Redis revocation 백엔드 상태를 즉시 확인하라."
          runbook: "docs/security/security-integrity-roadmap.md#p0-2"

      # ─────────────────────────────────────────────────
      # P0-2b: Rate limiter
      # ─────────────────────────────────────────────────
      - alert: RateLimitStorageUnavailable
        expr: increase(aqts_rate_limit_storage_failure_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          domain: security
        annotations:
          summary: "Rate limiter storage 장애 — 요청 503 차단 중"
          description: "slowapi storage (Redis) 가 실패하고 있다. fail-closed 정책에 따라 보호 대상 라우트가 503 RATE_LIMIT_STORE_UNAVAILABLE 를 반환한다."

      - alert: RateLimitExceededSpike
        expr: |
          sum by (route) (
            increase(aqts_rate_limit_exceeded_total[5m])
          ) > 50
        for: 2m
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "rate limit 초과 급증 (route={{ $labels.route }}, {{ $value }}건/5분)"
          description: "특정 라우트에서 5분 내 50건 이상 429 를 반환했다. 공격 / 잘못 구성된 클라이언트 가능성을 조사하라."

      # ─────────────────────────────────────────────────
      # P1-정합성: ReconciliationRunner
      # ─────────────────────────────────────────────────
      - alert: ReconciliationLedgerDiffNonZero
        expr: aqts_reconciliation_ledger_diff_abs > 0
        for: 0m
        labels:
          severity: critical
          domain: integrity
        annotations:
          summary: "포지션 원장 불일치: |diff|={{ $value }}"
          description: "브로커 보고 포지션과 내부 ledger 의 총합이 일치하지 않는다. ReconciliationRunner 가 임계 초과를 감지하면 TradingGuard kill switch 를 활성화한다. 알람 임계는 0 — 단 1주라도 허용하지 않는다."
          runbook: "docs/security/security-integrity-roadmap.md#p1-정합성"

      - alert: ReconciliationMismatchDetected
        expr: increase(aqts_reconciliation_mismatches_total[15m]) > 0
        for: 0m
        labels:
          severity: critical
          domain: integrity
        annotations:
          summary: "포지션 mismatch 발생 ({{ $value }}건/15분)"
          description: "ReconciliationRunner 가 최근 15분 내 mismatch 를 기록. ledger 원본과 브로커 보고 사이 개별 종목 불일치를 확인해야 한다."

      - alert: ReconciliationRunnerErrors
        expr: |
          sum(increase(aqts_reconciliation_runs_total{result="error"}[30m])) > 0
        for: 5m
        labels:
          severity: warning
          domain: integrity
        annotations:
          summary: "Reconciliation provider 실패 ({{ $value }}건/30분)"
          description: "PositionProvider 호출이 예외로 실패. reconcile 이 수행되지 못하는 상태 — 원장 정합성 감시 공백이 발생 중."

      - alert: ReconciliationRunnerMissing
        expr: |
          absent(aqts_reconciliation_runs_total) == 1
          or
          sum(increase(aqts_reconciliation_runs_total[24h])) == 0
        for: 6h
        labels:
          severity: warning
          domain: integrity
        annotations:
          summary: "스케줄러는 작동하지만 reconcile 이 24h 동안 한 번도 실행되지 않음"
          description: "TradingScheduler midday_check/post_market 핸들러는 돌지만 ReconciliationRunner 가 register 되지 않은 것으로 의심된다 (Wiring Rule 회귀). register_reconciliation_runner() 호출 경로를 점검하라."

      # ─────────────────────────────────────────────────
      # 환경변수 bool 비표준 표기 (Phase 2 준비)
      # ─────────────────────────────────────────────────
      - alert: EnvBoolNonStandardUsage
        expr: increase(aqts_env_bool_nonstandard_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
          domain: config
        annotations:
          summary: "비표준 bool 환경변수 표기 감지"
          description: "env_bool() 이 1/0/yes/no/on/off 같은 비표준 표기를 받아들였다. Phase 2 전환(strict=true 승격) 이전에 0 으로 만들어야 한다. docs/conventions/boolean-config.md 참조."

  # ─────────────────────────────────────
  # 알림 파이프라인 (Commit 3)
  # ─────────────────────────────────────
  # NotificationRouter (Telegram → File → Console cascade) 가 노출하는
  # `aqts_alert_dispatch_total` 과 AlertManager 재시도 루프가 노출하는
  # `aqts_alert_retry_dead_total` 을 관찰한다. 이 파이프라인이 자신의
  # 장애를 스스로 감지하지 않도록, 메타알림은 Prometheus + Alertmanager
  # (기존 telegram receiver) 경로로만 전달된다 — Decision 3-A.
  - name: aqts_alert_pipeline
    rules:
      - alert: AlertPipelineFailureRate
        expr: |
          (
            sum(rate(aqts_alert_dispatch_total{result="failure"}[10m]))
            /
            clamp_min(sum(rate(aqts_alert_dispatch_total[10m])), 1e-9)
          ) > 0.5
        for: 5m
        labels:
          severity: critical
          domain: alerting
        annotations:
          summary: "알림 파이프라인 실패율 50% 초과 ({{ $value | humanizePercentage }})"
          description: "NotificationRouter 의 모든 채널 발송 시도 중 절반 이상이 실패. primary(Telegram) 장애 또는 fallback 채널까지 포함한 전면 장애 가능성. docs/operations/alerting-audit-2026-04.md 의 런북 참조."

      - alert: AlertPipelineDeadTransitions
        expr: increase(aqts_alert_retry_dead_total[30m]) > 0
        for: 5m
        labels:
          severity: warning
          domain: alerting
        annotations:
          summary: "재시도 한도 초과 알림 발생 ({{ $value }}건/30분)"
          description: "AlertManager 가 최대 재시도 횟수(기본 3회) 를 초과하여 DEAD 로 전이시킨 알림이 있다. 수동 개입 또는 원인 이벤트 확인 필요."
