# ══════════════════════════════════════════════════════════════════════
# AQTS Canary Deployment — nginx Reverse Proxy
# ══════════════════════════════════════════════════════════════════════
#
# 트래픽 분할 전략:
#   - stable (v1): 현재 안정 버전
#   - canary (v2): 새 버전 (점진적 비중 증가)
#
# 비중 조절: upstream 블록의 weight 값 수정
#   10% → 30% → 50% → 100% (promotion_interval: 5m)
#
# 롤백 트리거 (자동 모니터링):
#   - error_rate > 5%
#   - latency_p95 > 3000ms
#   - health_check_failures >= 3
#

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── 로그 포맷 (카나리 식별용) ──
    log_format canary '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'upstream=$upstream_addr '
                      'response_time=$upstream_response_time '
                      'canary=$upstream_http_x_canary';

    access_log /var/log/nginx/access.log canary;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types application/json text/plain;

    # ── 업스트림: 안정 버전 (v1) ──
    upstream backend_stable {
        server backend-stable:8000 max_fails=3 fail_timeout=30s;
    }

    # ── 업스트림: 카나리 버전 (v2) ──
    upstream backend_canary {
        server backend-canary:8000 max_fails=3 fail_timeout=30s;
    }

    # ── 트래픽 분할 (split_clients) ──
    # $request_id 기반 일관된 라우팅
    # 10% 카나리 시작 → weight 조절로 점진적 증가
    split_clients "$request_id" $backend_pool {
        10%  backend_canary;
        *    backend_stable;
    }

    server {
        listen 80;
        server_name _;

        # ── 헬스체크 엔드포인트 (nginx 자체) ──
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-canary"}';
            add_header Content-Type application/json;
        }

        # ── 카나리 직접 접근 (테스트/디버깅용) ──
        location /canary/ {
            rewrite ^/canary/(.*) /$1 break;
            proxy_pass http://backend_canary;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Canary "true";
            add_header X-Served-By "canary" always;
        }

        # ── 안정 버전 직접 접근 (테스트/디버깅용) ──
        location /stable/ {
            rewrite ^/stable/(.*) /$1 break;
            proxy_pass http://backend_stable;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Served-By "stable" always;
        }

        # ── Prometheus 메트릭 (모니터링 패스쓰루) ──
        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
        }

        # ── Grafana 대시보드 (모니터링 패스쓰루) ──
        location /grafana/ {
            proxy_pass http://grafana:3000/grafana/;
            proxy_set_header Host $host;
        }

        # ── 메인 트래픽: split_clients 기반 분할 ──
        location / {
            proxy_pass http://$backend_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 카나리 식별 헤더
            proxy_set_header X-Canary-Weight "10";

            # 타임아웃 설정
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;

            # 업스트림 장애 시 다음 서버로 재시도
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }
    }
}
